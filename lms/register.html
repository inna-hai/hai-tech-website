<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה | HAI Tech Academy</title>
    <link rel="stylesheet" href="css/auth-new.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-bg"></div>
    
    <div class="auth-container">
        <div class="auth-logo">
            <a href="../index.html">
                <img src="../images/logo.webp" alt="HAI Tech Academy">
            </a>
            <p>הצטרפו לאקדמיה! 🚀</p>
        </div>
        
        <div class="auth-card">
            <h1 class="auth-title">יצירת חשבון</h1>
            <p class="auth-subtitle">התחילו את מסע הלמידה שלכם היום</p>
            
            <div class="error-message" id="errorMessage">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <span id="errorText">שגיאה בהרשמה</span>
            </div>
            
            <div class="success-message" id="successMessage">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <span>נרשמת בהצלחה! מעביר אותך...</span>
            </div>
            
            <form class="auth-form" id="registerForm">
                <div class="form-group">
                    <label class="form-label">שם מלא</label>
                    <div class="form-input-wrapper">
                        <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" class="form-input" id="name" placeholder="השם שלך" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">אימייל</label>
                    <div class="form-input-wrapper">
                        <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">סיסמה</label>
                    <div class="form-input-wrapper">
                        <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" class="form-input" id="password" placeholder="לפחות 6 תווים" required minlength="6">
                        <button type="button" class="password-toggle" id="togglePassword">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-open">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-closed" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">טלפון</label>
                    <div class="form-input-wrapper">
                        <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                        <input type="tel" class="form-input" id="phone" placeholder="050-0000000" required dir="ltr">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">אימייל הורה (אופציונלי)</label>
                    <div class="form-input-wrapper">
                        <svg class="form-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        <input type="email" class="form-input" id="parentEmail" placeholder="parent@email.com">
                    </div>
                </div>
                
                <label class="form-checkbox">
                    <input type="checkbox" id="terms" required>
                    <div class="checkbox-custom">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <span>אני מסכים/ה ל<a href="../terms.html" target="_blank" style="color: var(--accent-light);">תנאי השימוש</a> ול<a href="../privacy.html" target="_blank" style="color: var(--accent-light);">מדיניות הפרטיות</a></span>
                </label>
                
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span>צור חשבון</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                </button>
            </form>
            
            <div class="auth-footer">
                כבר יש לך חשבון? <a href="login.html">התחבר</a>
            </div>
        </div>
    </div>

    <script>
        // Password toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeOpen = togglePassword.querySelector('.eye-open');
        const eyeClosed = togglePassword.querySelector('.eye-closed');
        
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            eyeOpen.style.display = type === 'password' ? 'block' : 'none';
            eyeClosed.style.display = type === 'password' ? 'none' : 'block';
        });

        // Form submission
        const form = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value.trim();
            const parentEmail = document.getElementById('parentEmail').value;
            
            submitBtn.classList.add('btn-loading');
            submitBtn.disabled = true;
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            
            try {
                const response = await fetch('/lms/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, phone: phone || undefined, parentEmail: parentEmail || undefined })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('hai_lms_token', JSON.stringify(data.token));
                    localStorage.setItem('hai_lms_user', JSON.stringify(data.user));
                    localStorage.setItem('hai_lms_isLoggedIn', JSON.stringify(true));
                    
                    successMessage.classList.add('show');
                    
                    setTimeout(() => {
                        const params = new URLSearchParams(window.location.search);
                        const redirect = params.get('redirect');
                        window.location.href = redirect || 'index.html';
                    }, 1500);
                } else {
                    throw new Error(data.error || 'שגיאה בהרשמה');
                }
            } catch (error) {
                errorText.textContent = error.message || 'שגיאה בהרשמה';
                errorMessage.classList.add('show');
                submitBtn.classList.remove('btn-loading');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
