<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>שכחתי סיסמה | HAI Tech Academy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0f17 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .card {
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo { text-align: center; margin-bottom: 24px; font-size: 40px; }
        h1 { text-align: center; font-size: 22px; margin-bottom: 8px; color: #fff; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 28px; }
        label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 15, 25, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
            direction: ltr;
            text-align: left;
        }
        input:focus { border-color: #6366f1; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .message.success { display: block; background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .message.error { display: block; background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #818cf8; text-decoration: none; font-size: 14px; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🔑</div>
        <h1>שכחת סיסמה?</h1>
        <p class="subtitle">הזן/י את כתובת האימייל ונשלח לך קישור לאיפוס</p>

        <form id="forgotForm">
            <label for="email">אימייל</label>
            <input type="email" id="email" placeholder="your@email.com" required>
            <button type="submit" class="btn" id="submitBtn">שלח קישור איפוס</button>
        </form>

        <div class="message" id="message"></div>
        <a href="login.html" class="back-link">← חזרה להתחברות</a>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            const email = document.getElementById('email').value.trim();

            btn.disabled = true;
            btn.textContent = 'שולח...';
            msg.className = 'message';
            msg.style.display = 'none';

            try {
                const res = await fetch('/lms/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    msg.className = 'message success';
                    msg.innerHTML = '✅ <strong>הקישור נשלח!</strong><br>שלחנו לך מייל עם קישור לאיפוס סיסמה.<br>בדוק/בדקי את תיבת הדואר (גם בספאם 😉)';
                    document.getElementById('forgotForm').style.display = 'none';
                } else {
                    msg.className = 'message error';
                    msg.textContent = data.error || 'שגיאה בשליחה';
                }
            } catch {
                msg.className = 'message error';
                msg.textContent = 'שגיאת תקשורת, נסה שוב';
            }

            btn.disabled = false;
            btn.textContent = 'שלח קישור איפוס';
        });
    </script>
</body>
</html>
