<!-- Exit Intent Popup Component for דרך ההייטק -->
<!-- Include this in the main HTML before closing </body> tag -->

<div id="exitPopup" class="popup-overlay" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
    <div class="popup-container">
        <button class="popup-close" aria-label="סגור חלון">&times;</button>
        
        <div class="popup-content">
            <div class="popup-icon">
                <i data-lucide="gift"></i>
            </div>
            
            <h2 id="popupTitle" class="popup-title">רגע! 🎁</h2>
            <p class="popup-subtitle">לפני שעוזבים...</p>
            
            <div class="popup-offer">
                <span class="offer-badge">🎯 הזדמנות מיוחדת</span>
                <h3>שיעור ניסיון חינם!</h3>
                <p>השאירו פרטים ונציג יחזור אליכם<br>לתאם שיעור היכרות ללא התחייבות</p>
            </div>

            <form id="popupForm" class="popup-form">
                <div class="popup-form-group">
                    <input 
                        type="text" 
                        name="popup-name" 
                        placeholder="שם ההורה" 
                        required
                        autocomplete="name"
                    >
                </div>
                <div class="popup-form-group">
                    <input 
                        type="tel" 
                        name="popup-phone" 
                        placeholder="טלפון נייד" 
                        required
                        autocomplete="tel"
                        pattern="0[2-9][0-9]{7,8}"
                        dir="ltr"
                    >
                </div>
                <button type="submit" class="popup-submit-btn">
                    <i data-lucide="send"></i>
                    שלחו לי פרטים
                </button>
            </form>

            <div class="popup-trust">
                <span><i data-lucide="shield-check"></i> ללא התחייבות</span>
                <span><i data-lucide="lock"></i> פרטיות מובטחת</span>
            </div>

            <a href="https://wa.me/972533009742?text=%D7%94%D7%99%D7%99%2C%20%D7%9E%D7%A2%D7%95%D7%A0%D7%99%D7%99%D7%A0%D7%99%D7%9D%20%D7%91%D7%A9%D7%99%D7%A2%D7%95%D7%A8%20%D7%A0%D7%99%D7%A1%D7%99%D7%95%D7%9F%20%D7%97%D7%99%D7%A0%D7%9D" class="popup-whatsapp" target="_blank">
                <i data-lucide="message-circle"></i>
                או דברו איתנו ישירות בוואטסאפ
            </a>
        </div>
    </div>
</div>

<!-- 
Usage Instructions:
1. Copy this entire block into your index.html before </body>
2. Make sure lead-automation.js is loaded
3. The popup will show automatically on exit intent
4. Customize the offer text as needed
-->
